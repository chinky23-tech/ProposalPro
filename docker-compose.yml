services:
  backend:
    build:
      context: ./backend
    container_name: proposalpro-backend
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      DB_HOST: postgres
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: proposalpro-db
    restart: always
    environment:
      POSTGRES_USER: proposalpro
      POSTGRES_PASSWORD: proposalpro123
      POSTGRES_DB: proposalpro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
